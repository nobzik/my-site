<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAKAR.TECH</title>
    <style>
        :root { --bg: #050505; --card: #121212; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 150px; 
            gap: 15px; 
            width: 90%; max-width: 800px; 
        }
        .item { 
            background: var(--card); border-radius: 20px; border: 1px solid #222; 
            padding: 20px; display: flex; flex-direction: column; justify-content: center;
            transition: 0.3s; cursor: pointer;
        }
        .item:hover { border-color: #555; transform: scale(1.02); }
        .large { grid-column: span 2; grid-row: span 2; background: linear-gradient(45deg, #1e1e1e, #111); }
        .tall { grid-row: span 2; }
        h1 { margin: 0; font-size: 3rem; letter-spacing: -2px; }
        p { color: #888; }
        .social { font-weight: bold; color: #007aff; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item large">
            <h1>MAKAR A.</h1>
            <p>14 y.o. Developer & Creator</p>
        </div>
        <div class="item">
            <span class="social">Telegram</span>
        </div>
        <div class="item tall">
            <p>PROJECTS</p>
            <div style="font-size: 40px;">🚀</div>
        </div>
        <div class="item">
            <span class="social">Steam</span>
        </div>
        <div class="item">
            <p style="font-size: 12px;">STATUS</p>
            <p>Working on something cool...</p>
        </div>
    </div>
</body>
</html>
