<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAKAR.TECH</title>
    <style>
        /* Основные стили для страницы */
        body {
            background-color: #121212; /* Тёмно-серый фон (не чисто черный, приятнее для глаз) */
            color: #ffffff; /* Белый текст */
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; /* Красивый шрифт (системный для iOS/macOS) */
            display: flex; /* Делаем гибкий контейнер */
            justify-content: center; /* Центрируем по горизонтали */
            align-items: center; /* Центрируем по вертикали */
            height: 100vh; /* Высота всей страницы (высота экрана) */
            margin: 0; /* Убираем отступы по краям */
            text-align: center; /* Текст по центру */
        }

        /* Стиль для главного заголовка MAKAR */
        h1 {
            font-size: 3.5rem; /* Крупный размер шрифта */
            font-weight: 800; /* Очень жирный */
            letter-spacing: -2px; /* Чуть сближаем буквы для стиля */
            margin-bottom: 10px; /* Отступ снизу */
        }

        /* Стиль для надписи "здравстуйте" */
        p {
            font-size: 1.2rem; /* Обычный размер */
            color: #888; /* Серый цвет текста */
            margin-bottom: 30px; /* Отступ снизу до ссылки */
            text-transform: lowercase; /* Делаем текст маленькими буквами автоматически */
        }

        /* Стиль для ссылки на Telegram */
        a {
            color: #007aff; /* Классический синий цвет ссылок (как в Telegram) */
            text-decoration: none; /* Убираем нижнее подчеркивание */
            font-weight: 600; /* Полужирный шрифт */
            transition: color 0.3s; /* Плавное изменение цвета при наведении */
        }

        /* Стиль ссылки при наведении мыши */
        a:hover {
            color: #ffffff; /* При наведении ссылка становится белой */
        }
    </style>
</head>
<body>
    <div>
        <h1>MAKAR</h1>
        <p>здравстуйте</p>
        <a href="https://t.me/tgmakar">Telegram</a>
    </div>
</body>
</html>
